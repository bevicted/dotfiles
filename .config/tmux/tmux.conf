set-option -sa terminal-overrides ",xterm*:Tc"
set -as terminal-features ",xterm-ghostty:hyperlinks"
set -g mouse on
set -g focus-events on
set -g allow-passthrough on
set -g detach-on-destroy off
set -g status-interval 5

set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'tmux-plugins/tmux-sensible'
set -s escape-time 5 # https://superuser.com/a/1809494

set -g @plugin 'tmux-plugins/tmux-yank'
set -g @yank_action 'copy-pipe' # or 'copy-pipe-and-cancel' for the default

set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @plugin 'laktak/extrakto'
set -g @extrakto_copy_key ctrl-y
set -g @extrakto_insert_key enter

set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavour 'mocha' # latte,frappe, macchiato or mocha

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

set -g clock-mode-style 24
set -g history-limit 10000

set -g base-index 1
set -g pane-base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

setw -g mode-keys vi
bind r source-file ~/.config/tmux/tmux.conf \; display "reloaded"
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-select
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -r f display-popup -E -w 80% -h 60% tmux-sessionizer
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
