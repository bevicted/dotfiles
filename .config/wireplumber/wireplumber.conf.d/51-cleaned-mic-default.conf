# Bias default-INPUT selection toward the "Cleaned Mic" virtual source.
#
# WHY THIS FILE / WHAT IT REPLACES
#   The obvious approach would be to pin the configured default source via the
#   `default.configured.audio.source` metadata key. That is NOT a settable
#   config key in WirePlumber 0.5.x (it is mutable runtime metadata, normally
#   written by `wpctl set-default`, which the design explicitly rejects: we
#   want a tracked, declarative config file with no mutable runtime state).
#
#   Instead we lean on WirePlumber's own default-node selection logic. In
#   0.5.14, scripts/default-nodes/find-best-default-node.lua selects the
#   available node with the highest `priority.session`
#   (scripts/lib/node-utils.lua:get_session_priority, which falls back to
#   `priority.driver` when `priority.session` is unset).
#
#   So the auto-default for input is controlled purely by relative session
#   priority. This file lowers every physical ALSA capture device far below
#   the "Cleaned Mic" virtual source's priority, so the virtual source wins
#   the auto-default race without any runtime state.
#
#   The matching half — raising the virtual source's own priority.session —
#   CANNOT live here: `effect_output.cleaned-mic` is created by PipeWire's
#   module-filter-chain, not by a WirePlumber monitor, so no WirePlumber rule
#   section (the only ones consumed in 0.5.14 are access.rules,
#   device.profile.priority.rules, monitor.{alsa,bluez,libcamera}.rules and
#   stream.rules) can reach it. Its priority.session is therefore declared
#   declaratively in its own node definition, in the filter-chain config:
#   ~/.config/pipewire/pipewire.conf.d/99-input-denoise.conf (playback.props).
#
#   Schema mirrored verbatim from the installed authority:
#   /usr/share/wireplumber/wireplumber.conf.d/alsa-vm.conf
#   ( <section>.rules = [ { matches = [ {k = v} ] actions = { update-props = {} } } ] ;
#     a "~" prefix on a value means the value is a regular expression ).
#   `monitor.alsa.rules` is consumed by
#   /usr/share/wireplumber/scripts/monitors/alsa.lua (match_rules_update_properties),
#   which is exactly where priority.session for ALSA nodes is applied.
#
#   Raw hardware mics are NOT removed or disabled — only de-prioritized — so
#   they remain fully selectable (manual pick / wpctl / pavucontrol).

monitor.alsa.rules = [
  # Every physical ALSA capture device -> low session priority. They stay
  # present and selectable; they just lose the auto-default race to the
  # "Cleaned Mic" virtual source (priority 2000, set in its own definition).
  {
    matches = [
      {
        media.class = "Audio/Source"
        device.api  = "alsa"
      }
    ]
    actions = {
      update-props = {
        priority.session = 500
      }
    }
  }
]
