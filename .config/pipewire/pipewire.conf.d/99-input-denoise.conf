# Cleaned Mic - libpipewire-module-filter-chain input denoise source
#
# Chain:  hardware mic -> RNNoise -> high-pass -> high-shelf -> SC4 compressor
#         -> virtual Audio/Source "Cleaned Mic"
#
# Loaded via PipeWire conf.d (stowed to ~/.config/pipewire/pipewire.conf.d/).
# Restart with: systemctl --user restart pipewire
#
# ----------------------------------------------------------------------------
# [TUNE] controls - edit the number, restart pipewire, done.
#
#   rnnoise  "VAD Threshold (%)"     unit %       range 0 .. 99    (default 49.5)
#       Higher = more aggressive gating of non-voice. Currently 50.0
#
#   hp (bq_highpass)
#       "Freq"                       unit Hz      range > 0        Currently 90.0
#           Roll off rumble/plosives/HVAC below this frequency.
#       "Q"                          unit (none)  ~0.5 .. 2        Currently 0.707
#           0.707 = Butterworth (maximally flat, no resonant peak).
#
#   hs (bq_highshelf)
#       "Freq"                       unit Hz      range > 0        Currently 6000.0
#           Shelf corner; affects everything above this frequency.
#       "Q"                          unit (none)  ~0.5 .. 2        Currently 0.707
#       "Gain"                       unit dB      +/- some dB      Currently -3.0
#           Negative = tame harsh sibilance/hiss in the high end.
#
#   comp (sc4m mono compressor) - full control set per plugin:
#       "RMS/peak"             unit (none) range 0 .. 1    default 0    (unset)
#       "Attack time (ms)"     unit ms     range 1.5 .. 400 default 101.125 (unset)
#       "Release time (ms)"    unit ms     range 2 .. 800  default 401  (unset)
#       "Threshold level (dB)" unit dB     range -30 .. 0  Currently -18.0
#           Level above which gain reduction kicks in.
#       "Ratio (1:n)"          unit (none) range 1 .. 20   Currently 3.0
#           Compression ratio. 3 = moderate vocal leveling.
#       "Knee radius (dB)"     unit dB     range 1 .. 10   default 3.25 (unset)
#       "Makeup gain (dB)"     unit dB     range 0 .. 24   Currently 6.0
#           Post-compression gain to restore perceived loudness.
# ----------------------------------------------------------------------------

context.modules = [
    { name = libpipewire-module-filter-chain
        flags = [ nofail ]
        args = {
            node.description = "Cleaned Mic"
            media.name       = "Cleaned Mic"
            filter.graph = {
                nodes = [
                    {
                        type    = ladspa
                        name    = rnnoise
                        plugin  = "librnnoise_ladspa"
                        label   = noise_suppressor_mono
                        control = {
                            "VAD Threshold (%)" 50.0
                        }
                    }
                    {
                        type    = builtin
                        name    = hp
                        label   = bq_highpass
                        control = {
                            "Freq" 90.0
                            "Q"    0.707
                        }
                    }
                    {
                        type    = builtin
                        name    = hs
                        label   = bq_highshelf
                        control = {
                            "Freq" 6000.0
                            "Q"    0.707
                            "Gain" -3.0
                        }
                    }
                    {
                        type    = ladspa
                        name    = comp
                        plugin  = "sc4m_1916"
                        label   = sc4m
                        control = {
                            "Ratio (1:n)"          3.0
                            "Threshold level (dB)" -18.0
                            "Makeup gain (dB)"     6.0
                        }
                    }
                ]
                links = [
                    { output = "rnnoise:Output" input = "hp:In" }
                    { output = "hp:Out"          input = "hs:In" }
                    { output = "hs:Out"          input = "comp:Input" }
                ]
            }
            audio.channels = 1
            audio.position = [ MONO ]
            capture.props = {
                node.name    = "effect_input.cleaned-mic"
                node.passive = true
                audio.channels = 1
                audio.position = [ MONO ]
            }
            playback.props = {
                node.name        = "effect_output.cleaned-mic"
                media.class      = Audio/Source
                node.description = "Cleaned Mic"
                audio.channels   = 1
                audio.position   = [ MONO ]
                # High session priority so WirePlumber's default-nodes policy
                # auto-selects this virtual source as the default input. The
                # matching half (lowering physical ALSA mics to 500) lives in
                # ~/.config/wireplumber/wireplumber.conf.d/51-cleaned-mic-default.conf
                # This is the only WirePlumber-visible declarative place for
                # this node's priority: it is created here by
                # module-filter-chain, not by any WirePlumber monitor, so no
                # WirePlumber *.rules section can reach it.
                priority.session = 2000
            }
        }
    }
]
